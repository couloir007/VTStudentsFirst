config_rewrite: replace
langcode: en
status: true
dependencies:
  config:
    - filter.format.full_html
  module:
    - ckeditor5
format: full_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - heading
      - style
      - bold
      - italic
      - strikethrough
      - superscript
      - subscript
      - highlight
      - removeFormat
      - '|'
      - link
      # - anchor
      - pageBreak
      - '|'
      - bulletedList
      - numberedList
      - indent
      - outdent
      - '|'
      - specialCharacters
      - Emoji
      - blockQuote
      - horizontalLine
      - '|'
      - drupalMedia
      - node
      - paragraphs_library_item
      - detail
      - embeddedContent__default
      - insertTable
      - insertTemplate
      - tokenBrowser
      - '|'
      - findAndReplace
      # - wproofreader
      - '|'
      - showBlocks
      - sourceEditing
      - '|'
      - fullScreen
      - '-'
  plugins:
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
      multiBlock: true
    ckeditor5_paste_filter_pasteFilter:
      enabled: true
      filters:
        -
          enabled: true
          weight: -10
          search: '<o:p><\/o:p>'
          replace: ''
        -
          enabled: true
          weight: -9
          search: '(<[^>]*) (style="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -8
          search: '(<[^>]*) (face="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -7
          search: '(<[^>]*) (class="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -6
          search: '(<[^>]*) (valign="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -5
          search: '<font[^>]*>'
          replace: ''
        -
          enabled: true
          weight: -4
          search: '<\/font>'
          replace: ''
        -
          enabled: true
          weight: -3
          search: '<span[^>]*>'
          replace: ''
        -
          enabled: true
          weight: -2
          search: '<\/span>'
          replace: ''
        -
          enabled: true
          weight: -1
          search: '<p>&nbsp;<\/p>'
          replace: ''
        -
          enabled: true
          weight: 0
          search: '<p><\/p>'
          replace: ''
        -
          enabled: true
          weight: 1
          search: '<b><\/b>'
          replace: ''
        -
          enabled: true
          weight: 2
          search: '<i><\/i>'
          replace: ''
        -
          enabled: true
          weight: 3
          search: '<a name="OLE_LINK[^"]*">(.*?)<\/a>'
          replace: $1
    ckeditor5_plugin_pack_find_and_replace__find_and_replace:
      ui_type: dialog
    ckeditor5_plugin_pack_highlight__highlight:
      options: {  }
      use_default_markers: true
    ckeditor5_plugin_pack_indent_block__indent_block:
      enabled: true
    ckeditor5_plugin_pack_text_transformation__text_transformation:
      enabled: true
      extra_transformations: ''
      extra_regex_transformations: {  }
      groups:
        typography:
          transformations:
            ellipsis:
              enabled: 1
            enDash:
              enabled: 1
            emDash:
              enabled: 1
          enabled: 1
        quotes:
          transformations:
            quotesPrimary:
              enabled: 1
            quotesSecondary:
              enabled: 1
          enabled: 1
        symbols:
          transformations:
            trademark:
              enabled: 1
            registeredTrademark:
              enabled: 1
            copyright:
              enabled: 1
          enabled: 1
        mathematical:
          transformations:
            oneHalf:
              enabled: 1
            oneThird:
              enabled: 1
            twoThirds:
              enabled: 1
            oneFourth:
              enabled: 1
            threeQuarters:
              enabled: 1
            lessThanOrEqual:
              enabled: 1
            greaterThanOrEqual:
              enabled: 1
            notEqual:
              enabled: 1
            arrowLeft:
              enabled: 1
            arrowRight:
              enabled: 1
          enabled: 1
        misc:
          transformations:
            quotesPrimaryEnGb:
              enabled: 0
            quotesSecondaryEnGb:
              enabled: 0
            quotesPrimaryPl:
              enabled: 0
            quotesSecondaryPl:
              enabled: 0
          enabled: 0
    ckeditor5_plugin_pack_word_count__word_count:
      word_count_enabled: true
      word_count_mode: words_chars
    ckeditor5_sourceEditing:
      allowed_tags: {  }
    ckeditor5_style:
      styles:
        -
          label: 'Paragraph: Border'
          element: '<p class="border">'
        -
          label: 'Paragraph: Highlight'
          element: '<p class="highlight">'
        -
          label: 'Paragraph: Shadow'
          element: '<p class="shadow">'
    ckeditor_codemirror_source_editing:
      enable: true
      mode: htmlmixed
      options:
        autoCloseBrackets: true
        autoCloseTags: true
        folding: true
        lineNumbers: true
        lineWrapping: true
        matchBrackets: true
        matchTags: true
        searchBottom: true
        styleActiveLine: true
    ckeditor_link_styles_linkStyles:
      styles:
        -
          label: Button
          element: '<a class="button">'
        -
          label: 'Button: small'
          element: '<a class="button button--small">'
        -
          label: 'Button: primary'
          element: '<a class="button button--primary">'
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
    media_media:
      allow_view_mode_override: false
    token_filter_token_browser:
      token_types:
        current-page: current-page
image_upload:
  status: false
