name: 'Schema.org: Action (Button)'
props:
  type: object
  required:
    - name
    - url
  properties:
    subtype:
      type: string
      title: Subtype
      description: 'A more specific subtype for the item.'
      enum:
        - ViewAction
        - RegisterAction
        - SubscribeAction
        - ApplyAction
    name:
      type: string
      title: Name
      description: 'The name of the item.'
    url:
      type: string
      title: URL
      description: 'URL of the item.'
