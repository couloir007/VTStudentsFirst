field.field.paragraph.hero_section.field_hero_subheadline:
  type: field_config
  field_name: field_hero_subheadline
  entity_type: paragraph
  bundle: hero_section
  label: 'Subheadline'
  required: false

# Stats (nested Paragraph: StatItem)
field.storage.paragraph.field_hero_stats:
  type: field_storage_config
  field_name: field_hero_stats
  entity_type: paragraph
  type: entity_reference_revisions
  cardinality: 3
  settings:
    target_type: paragraph

field.field.paragraph.hero_section.field_hero_stats:
  type: field_config
  field_name: field_hero_stats
  entity_type: paragraph
  bundle: hero_section
  label: 'Stats'
  required: false
  settings:
    handler: 'default:paragraph'
    handler_settings:
      target_bundles:
        stat_item: stat_item

# Primary CTA
field.storage.paragraph.field_cta_primary:
  type: field_storage_config
  field_name: field_cta_primary
  entity_type: paragraph
  type: link
  cardinality: 1

field.field.paragraph.hero_section.field_cta_primary:
  type: field_config
  field_name: field_cta_primary
  entity_type: paragraph
  bundle: hero_section
  label: 'Primary CTA'
  required: true
  settings:
    link_type: 17
    title: ENABLED

# Secondary CTA
field.storage.paragraph.field_cta_secondary:
  type: field_storage_config
  field_name: field_cta_secondary
  entity_type: paragraph
  type: link
  cardinality: 1

field.field.paragraph.hero_section.field_cta_secondary:
