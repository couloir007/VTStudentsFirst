# =============================================================================
# VTStudentsFirst.org — Content Type & Paragraph Bundle Definitions
# Drupal 10 config YAML
# Architecture: node:WebPage (homepage) + Paragraphs field_sections
# Storybook integration: custom Twig adapter (1 bundle = 1 component)
# Schema Blueprints mapping set: campaign
# =============================================================================


# -----------------------------------------------------------------------------
# NODE: WebPage (Homepage)
# Schema.org: schema:WebPage
# Front page node. No body field. All content via field_sections (Paragraphs).
# -----------------------------------------------------------------------------

node.type.web_page:
  type: node_type
  langcode: en
  status: true
  name: 'Web Page'
  type: web_page
  description: 'Static web pages including the homepage. Layout is dev-controlled via Paragraph sections; editors populate content fields only.'
  help: ''
  new_revision: true
  preview_mode: 1
  display_submitted: false

field.storage.node.field_sections:
  type: field_storage_config
  field_name: field_sections
  entity_type: node
  type: entity_reference_revisions
  cardinality: -1
  settings:
    target_type: paragraph

field.field.node.web_page.field_sections:
  type: field_config
  field_name: field_sections
  entity_type: node
  bundle: web_page
  label: 'Page sections'
  required: false
  settings:
    handler: 'default:paragraph'
    handler_settings:
      target_bundles:
        hero_section: hero_section
        issue_section: issue_section
        stakes_section: stakes_section
        positions_section: positions_section
        accountability_section: accountability_section
        voices_section: voices_section
        action_section: action_section
      target_bundles_drag_drop:
        hero_section: { enabled: true, weight: 0 }
        issue_section: { enabled: true, weight: 1 }
        stakes_section: { enabled: true, weight: 2 }
        positions_section: { enabled: true, weight: 3 }
        accountability_section: { enabled: true, weight: 4 }
        voices_section: { enabled: true, weight: 5 }
        action_section: { enabled: true, weight: 6 }

field.storage.node.field_meta_description:
  type: field_storage_config
  field_name: field_meta_description
  entity_type: node
  type: string_long
  cardinality: 1

field.field.node.web_page.field_meta_description:
  type: field_config
  field_name: field_meta_description
  entity_type: node
  bundle: web_page
  label: 'Meta description'
  required: false


# =============================================================================
# PARAGRAPH BUNDLES
# Each bundle = one homepage section = one Storybook component.
# Twig template naming convention: paragraph--{bundle-name}.html.twig
# Storybook story naming convention: {BundleName}.stories.js
# =============================================================================


# -----------------------------------------------------------------------------
# PARAGRAPH: HeroSection
# Twig: paragraph--hero-section.html.twig
# Storybook: HeroSection.stories.js
# Schema.org: no direct mapping — child of node:WebPage (schema:WebPage)
# Fields: headline, subheadline, stats (nested), primary CTA, secondary CTA
# -----------------------------------------------------------------------------

paragraphs.paragraphs_type.hero_section:
  type: paragraphs_type
  label: 'Hero Section'
  id: hero_section
  description: 'Full-viewport hero with headline, subheadline, stat bar, and dual CTAs.'

# Headline
field.storage.paragraph.field_hero_headline:
  type: field_storage_config
  field_name: field_hero_headline
  entity_type: paragraph
  type: string
  cardinality: 1

field.field.paragraph.hero_section.field_hero_headline:
  type: field_config
  field_name: field_hero_headline
  entity_type: paragraph
  bundle: hero_section
  label: 'Headline'
  required: true

# Subheadline
field.storage.paragraph.field_hero_subheadline:
  type: field_storage_config
  field_name: field_hero_subheadline
  entity_type: paragraph
